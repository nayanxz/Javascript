trigger:
    - main
    
pool:
  vmImage: 'ubuntu-latest'
    
stages:
    - stage: Build
      displayName: Build stage
      jobs:  
      - job: Build
        displayName: Build
        steps:
        - task: UseNode@1
          inputs:
            version: '16.x'
          displayName: 'Install Node.js'
        - script: |
            npm install
            npm run build --if-present
            npm run test --if-present
          displayName: 'npm install, build and test'
        - task: ArchiveFiles@2
          displayName: 'Archive files'
          inputs:
            rootFolderOrFile: '$(System.DefaultWorkingDirectory)'
            includeRootFolder: false
            archiveType: zip
            archiveFile: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
            replaceExistingArchive: true
        - upload: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
          artifact: drop
        - powershell: |
            #echo "Removing current Mend CLI"
            #Remove-Item -Path "./mend" -Force -ErrorAction SilentlyContinue
            #echo "Downloading Mend CLI"
            #Invoke-WebRequest -Uri "https://downloads.mend.io/cli/linux_amd64/mend" -OutFile "mend"
            #echo "Start-> Mend (Dependencies) scan"
            #./mend.exe dep -u -s "//$(system.teamProject)//$(MendProductName)_$(Build.Repository.Name)_$(Build.SourceBranchName)"
            #echo "Start-> Mend (SAST) Scan"
            #./mend.exe code --name=$(MendProductName)_$(Build.SourceBranchName)_$(Build.BuildNumber) --app "$(system.teamProject)"
            
            $MendDownloadUrl = "https://downloads.mend.io/cli/linux_amd64/mend"  # Adjust URL if needed
            $MendBinaryPath = "./mend"
            Invoke-WebRequest -Uri $MendDownloadUrl -OutFile $MendBinaryPath
            # Ensure file exists before proceeding
            if (Test-Path $MendBinaryPath) {
                chmod +x $MendBinaryPath
                & $MendBinaryPath dep -u -s "//$(system.teamProject)//$(MendProductName)_$(Build.Repository.Name)_$(Build.SourceBranchName)"
                & $MendBinaryPath code --name=$(MendProductName)_$(Build.SourceBranchName)_$(Build.BuildNumber) -s "*//$(System.TeamProject)//$(MendProductName)_$(Build.Repository.Name)_$(Build.SourceBranchName)"
            } else {
                Write-Host "Mend CLI download failed. Exiting..."
                exit 1
            }
          displayName: "Mend Scan"
          errorActionPreference: continue
          continueOnError: true
          env:
            MEND_EMAIL: $(mendemail)
            MEND_ORGANIZATION: $(mendorganization)
            MEND_URL: $(mendurl)
            MEND_USER_KEY: $(menduserkey)